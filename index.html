<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenoxbest7 | Giriş Bilen Kanallar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Yavaşça Ekrana Zoom Yapan ve Renk Değiştiren Arka Plan */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            /* Harika renk geçişleri (Mavi, Mor, Pembe tonları) */
            background: linear-gradient(135deg, #1f005c, #5b0060, #870160, #ac255e, #ca485c, #e16b5c, #f39060, #ffb56b);
            background-size: 300% 300%;
            /* 15 saniyede bir renkleri kaydır ve ekrana doğru %20 zoom yap */
            animation: zoomAndPan 15s ease-in-out infinite alternate;
        }

        @keyframes zoomAndPan {
            0% {
                background-position: 0% 50%;
                transform: scale(1);
            }
            100% {
                background-position: 100% 50%;
                transform: scale(1.2);
            }
        }

        body {
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Buzlu Cam (Glassmorphism) Efektli Kutu */
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(20, 20, 25, 0.6); /* Yarı saydam siyah */
            backdrop-filter: blur(15px); /* Arkadaki renkleri bulanıklaştırır */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* Ana Profil Fotoğrafı */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px auto;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: block;
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 15px;
            color: #d1d5db;
            margin-bottom: 25px;
        }

        /* Buton Grubu */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Buton İkonları İçin Ayar */
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-text {
            flex: 1;
            text-align: left;
        }

        /* Butonlara Tıklama / Üzerine Gelme Efekti */
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Sağdaki Ok Simgesi */
        .arrow {
            font-size: 18px;
            transition: transform 0.3s;
            opacity: 0.7;
        }

        .btn:hover .arrow {
            transform: translateX(5px);
            opacity: 1;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <!-- Animasyonlu Arka Plan Katmanı -->
    <div class="animated-bg"></div>

    <div class="container">
        <!-- 1. Kendi Profil Fotoğrafın (src kısmına fotoğrafın adını yaz) -->
        <img src="profil.jpg" alt="Profil Fotoğrafı" class="profile-img">
        
        <h1>@Lenoxbest7</h1>
        <p class="subtitle">Ähli official Telegram salgylarym bilen proýektlerim</p>

        <div class="links-group">
            
            <!-- Şahsi Profil -->
            <a href="https://t.me/Lenoxbest7" target="_blank" class="btn">
                <img src="profil.jpg" alt="Profil Icon" class="btn-icon">
                <span class="btn-text">Telegram Profil</span>
                <span class="arrow">➔</span>
            </a>

            <!-- Telegram Kanalı -->
            <a href="https://t.me/vpnfreedrop" target="_blank" class="btn">
                <img src="kanal.jpg" alt="Kanal Icon" class="btn-icon">
                <span class="btn-text">Telegram Kanal</span>
                <span class="arrow">➔</span>
            </a>

            <!-- Telegram Chat -->
            <a href="https://t.me/vpnfreedropchat" target="_blank" class="btn">
                <img src="chat.jpg" alt="Chat Icon" class="btn-icon">
                <span class="btn-text">Telegram Chat</span>
                <span class="arrow">➔</span>
            </a>

            <!-- Telegram Bot -->
            <a href="https://t.me/freesubscriptionbot" target="_blank" class="btn">
                <img src="bot.jpg" alt="Bot Icon" class="btn-icon">
                <span class="btn-text">Telegram Bot</span>
                <span class="arrow">➔</span>
            </a>

        </div>

        <div class="footer">
            © 2026 Lenoxbest7.
        </div>
    </div>

</body>
</html>
